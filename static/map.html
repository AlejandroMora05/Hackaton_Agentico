<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi mapa de pénsum · tutorIA UdeA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #f4fbf7; }

    .typing-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #00783A;
      animation: bounce 1.3s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) { animation-delay: .18s; }
    .typing-dot:nth-child(3) { animation-delay: .36s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: .35; }
      30%            { transform: translateY(-8px); opacity: 1; }
    }

    .materia-box {
      width: 200px;
      position: relative;
      z-index: 1;
      cursor: pointer;
      transition: box-shadow .15s, transform .15s, opacity .15s;
    }
    .materia-box:hover {
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
      transform: translateY(-1px);
    }
    .materia-box.is-selected   { outline: 3px solid #2563eb; outline-offset: 2px; }
    .materia-box.is-prereq     { outline: 3px solid #f59e0b; outline-offset: 2px; }
    .materia-box.is-correq     { outline: 3px solid #a855f7; outline-offset: 2px; }
    .materia-box.is-unlocks    { outline: 3px solid #10b981; outline-offset: 2px; }
    .materia-box.is-dimmed     { opacity: 0.3; }
    .nivel-col {
      width: 200px;
      position: relative;
      z-index: 1;
      padding-right: 16px;
      border-right: 1px dashed #d8e6dd;
    }
    .nivel-col:last-child { border-right: none; padding-right: 0; }
    #arrows { z-index: 0; }
  </style>
</head>
<body class="min-h-screen">

  <header class="bg-[#00783A] text-white px-6 py-4 flex items-center justify-between shadow sticky top-0 z-10">
    <div>
      <h1 class="font-semibold text-base leading-tight">Mi mapa de pénsum</h1>
      <p id="headerInfo" class="text-green-200 text-xs mt-0.5"></p>
    </div>
    <div class="flex items-center gap-4 text-xs">
      <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded bg-white border border-gray-300 inline-block"></span>Pendiente / aprobada</span>
      <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded bg-green-500 inline-block"></span>Cursando · ganando</span>
      <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded bg-orange-500 inline-block"></span>Cursando · en riesgo</span>
      <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded bg-red-500 inline-block"></span>Cursando · perdiendo</span>
      <span class="flex items-center gap-1.5"><span class="w-4 h-0 border-t-2 border-dashed border-amber-500 inline-block"></span>Correquisito</span>
    </div>
  </header>

  <div id="selectionHint" class="hidden bg-white border-b border-gray-100 px-6 py-2 flex items-center gap-4 text-xs text-gray-500 flex-wrap">
    <span>Click en una materia para ver sus relaciones:</span>
    <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-white inline-block" style="outline:2px solid #2563eb"></span>Seleccionada</span>
    <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-white inline-block" style="outline:2px solid #f59e0b"></span>Prerrequisito</span>
    <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-white inline-block" style="outline:2px solid #a855f7"></span>Correquisito</span>
    <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-full bg-white inline-block" style="outline:2px solid #10b981"></span>Desbloquea</span>
    <button onclick="selectMateria(null)" class="ml-auto text-[#00783A] hover:underline">Limpiar selección</button>
  </div>

  <main id="appRoot" class="p-6">
    <div class="max-w-lg mx-auto bg-white border border-gray-200 rounded-2xl shadow-sm p-6 mt-10 text-center">
      <p class="text-sm text-gray-600">Vamos a abrir una ventana del portal de la UdeA para que inicies sesión.</p>
      <button id="startBtn" onclick="startFlow()" class="mt-4 bg-[#00783A] hover:bg-[#005f2d] text-white text-sm font-medium rounded-xl px-5 py-2.5 transition-colors">
        Iniciar sesión
      </button>
    </div>
  </main>

  <script>
    function esc(t) {
      return String(t)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function colorMeta(color) {
      if (color === 'red')    return { border: 'border-red-400',    bg: 'bg-red-50',    text: 'text-red-700' };
      if (color === 'orange') return { border: 'border-orange-400', bg: 'bg-orange-50', text: 'text-orange-700' };
      if (color === 'green')  return { border: 'border-green-500',  bg: 'bg-green-50',  text: 'text-green-700' };
      return { border: 'border-gray-200', bg: 'bg-white', text: 'text-gray-700' };
    }

    function materiaBoxHtml(m) {
      const c = colorMeta(m.cursando ? m.color : null);
      const tooltipParts = [];
      if (m.cursando) tooltipParts.push(m.mensaje);
      if (m.prerequisitos?.length) tooltipParts.push(`Requiere: ${m.prerequisitos.join(', ')}`);
      if (m.correquisitos?.length) tooltipParts.push(`Correquisito: ${m.correquisitos.join(', ')}`);
      const tooltip = esc(tooltipParts.join(' · '));
      const clickable = m.codigo ? `onclick="selectMateria('${m.codigo}')"` : '';
      return `
        <div id="mat-${m.codigo}" data-codigo="${m.codigo}"
             class="materia-box border ${c.border} ${c.bg} rounded-xl px-2.5 py-2 shadow-sm"
             title="${tooltip}" ${clickable}>
          <p class="text-[10px] text-gray-400 leading-none">${esc(m.codigo)} · ${m.creditos ?? '—'} cr</p>
          <p class="text-xs font-medium ${c.text} leading-snug mt-0.5">${esc(m.nombre)}</p>
          ${m.cursando ? `<p class="text-[10px] ${c.text} mt-1 font-semibold">Cursando</p>` : ''}
        </div>`;
    }

    function buildGrid(data) {
      const columns = data.niveles.map(n => {
        const creditos = n.materias.reduce((acc, m) => acc + (m.creditos ?? 0), 0);
        return `
        <div class="nivel-col flex flex-col gap-3 flex-shrink-0">
          <div class="text-center bg-[#00783A] text-white text-xs font-semibold rounded-md py-1.5 leading-tight">
            Nivel ${n.nivel}
            <span class="block text-[10px] font-normal text-green-200">${creditos} créditos</span>
          </div>
          ${n.materias.map(materiaBoxHtml).join('')}
        </div>`;
      }).join('');

      return `
        <div id="scrollArea" class="overflow-x-auto pb-4">
          <div id="canvas" class="relative inline-block">
            <div id="grid" class="flex gap-8 items-start relative">
              ${columns}
            </div>
            <svg id="arrows" class="absolute top-0 left-0 pointer-events-none">
              <defs>
                <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
                  <path d="M0,0 L6,3 L0,6 Z" fill="#9ca3af" />
                </marker>
              </defs>
            </svg>
          </div>
        </div>`;
    }

    function buildElectivas(data) {
      if (!data.electivas.length) return '';
      const cards = data.electivas.map(grupo => {
        const items = grupo.materias.map(m => {
          const c = colorMeta(m.cursando ? m.color : null);
          return `
            <li class="flex items-center justify-between gap-2 px-2 py-1 rounded ${m.cursando ? c.bg : ''}">
              <span class="text-xs ${m.cursando ? c.text + ' font-medium' : 'text-gray-600'}">${esc(m.nombre)}</span>
              ${m.cursando ? `<span class="text-[10px] font-semibold ${c.text}">Cursando</span>` : ''}
            </li>`;
        }).join('');
        return `
          <div class="bg-white border border-gray-200 rounded-xl p-4">
            <p class="text-sm font-semibold text-gray-800">${esc(grupo.grupo)}</p>
            <p class="text-xs text-gray-400 mb-2">${esc(grupo.requisito)}</p>
            <ul class="space-y-0.5 max-h-40 overflow-y-auto">${items}</ul>
          </div>`;
      }).join('');

      return `
        <div class="mt-10">
          <h2 class="text-sm font-semibold text-gray-700 mb-3">Electivas y énfasis (no tienen un nivel fijo, tú eliges)</h2>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">${cards}</div>
        </div>`;
    }

    function rectRelativeToCanvas(el, canvas) {
      let x = 0, y = 0, node = el;
      while (node && node !== canvas) {
        x += node.offsetLeft;
        y += node.offsetTop;
        node = node.offsetParent;
      }
      return { x, y, w: el.offsetWidth, h: el.offsetHeight };
    }

    function drawArrows(data) {
      const canvas = document.getElementById('canvas');
      const svg = document.getElementById('arrows');
      svg.setAttribute('width', canvas.scrollWidth);
      svg.setAttribute('height', canvas.scrollHeight);

      const allMaterias = data.niveles.flatMap(n => n.materias);
      const paths = [];

      allMaterias.forEach(m => {
        (m.prerequisitos || []).forEach(codigoPrereq => {
          const fromEl = document.getElementById(`mat-${codigoPrereq}`);
          const toEl = document.getElementById(`mat-${m.codigo}`);
          if (!fromEl || !toEl) return;

          const from = rectRelativeToCanvas(fromEl, canvas);
          const to = rectRelativeToCanvas(toEl, canvas);

          const x1 = from.x + from.w, y1 = from.y + from.h / 2;
          const x2 = to.x, y2 = to.y + to.h / 2;
          const bend = Math.max(24, Math.abs(x2 - x1) * 0.4);
          const cx1 = x1 + bend;
          const cx2 = x2 - bend;

          paths.push(`<path data-from="${codigoPrereq}" data-to="${m.codigo}" d="M${x1},${y1} C${cx1},${y1} ${cx2},${y2} ${x2},${y2}" fill="none" stroke="#b9c4cf" stroke-width="1.25" opacity="0.85" marker-end="url(#arrowhead)" />`);
        });

        (m.correquisitos || []).forEach(codigoCoreq => {
          const fromEl = document.getElementById(`mat-${codigoCoreq}`);
          const toEl = document.getElementById(`mat-${m.codigo}`);
          if (!fromEl || !toEl) return;

          const from = rectRelativeToCanvas(fromEl, canvas);
          const to = rectRelativeToCanvas(toEl, canvas);

          const sameColumn = Math.abs(from.x - to.x) < 5;
          let x1, y1, x2, y2;
          if (sameColumn) {
            const fromIsAbove = from.y < to.y;
            x1 = from.x + from.w / 2; y1 = fromIsAbove ? from.y + from.h : from.y;
            x2 = to.x + to.w / 2;     y2 = fromIsAbove ? to.y : to.y + to.h;
          } else {
            const fromIsLeft = from.x < to.x;
            x1 = fromIsLeft ? from.x + from.w : from.x; y1 = from.y + from.h / 2;
            x2 = fromIsLeft ? to.x : to.x + to.w;        y2 = to.y + to.h / 2;
          }

          paths.push(`<path data-from="${codigoCoreq}" data-to="${m.codigo}" d="M${x1},${y1} L${x2},${y2}" fill="none" stroke="#f59e0b" stroke-width="1.25" stroke-dasharray="3,3" opacity="0.85" />`);
        });
      });

      svg.innerHTML = svg.querySelector('defs').outerHTML + paths.join('');
    }

    let allMateriasByCode = {};
    let selectedCodigo = null;

    function buildMateriaIndex(data) {
      allMateriasByCode = {};
      data.niveles.forEach(n => n.materias.forEach(m => {
        if (m.codigo) allMateriasByCode[m.codigo] = m;
      }));
    }

    function selectMateria(codigo) {
      selectedCodigo = (selectedCodigo === codigo) ? null : codigo;
      applySelectionHighlight();
    }

    function applySelectionHighlight() {
      const hint = document.getElementById('selectionHint');
      const boxes = document.querySelectorAll('.materia-box');
      const arrowPaths = document.querySelectorAll('#arrows path[data-from]');

      if (!selectedCodigo) {
        if (hint) hint.classList.add('hidden');
        boxes.forEach(el => el.classList.remove('is-selected', 'is-prereq', 'is-correq', 'is-unlocks', 'is-dimmed'));
        arrowPaths.forEach(p => { p.style.opacity = ''; p.style.strokeWidth = ''; });
        return;
      }

      if (hint) hint.classList.remove('hidden');

      const materia = allMateriasByCode[selectedCodigo];
      const prereqs = new Set(materia?.prerequisitos || []);
      const correqs = new Set(materia?.correquisitos || []);
      const unlocks = new Set();
      Object.values(allMateriasByCode).forEach(m => {
        if ((m.prerequisitos || []).includes(selectedCodigo)) unlocks.add(m.codigo);
        // los correquisitos solo se registran de un lado en el pénsum, así
        // que también se incluye la dirección inversa (relación simétrica).
        if ((m.correquisitos || []).includes(selectedCodigo)) correqs.add(m.codigo);
      });

      boxes.forEach(el => {
        const c = el.dataset.codigo;
        el.classList.remove('is-selected', 'is-prereq', 'is-correq', 'is-unlocks', 'is-dimmed');
        if (c === selectedCodigo) el.classList.add('is-selected');
        else if (prereqs.has(c)) el.classList.add('is-prereq');
        else if (correqs.has(c)) el.classList.add('is-correq');
        else if (unlocks.has(c)) el.classList.add('is-unlocks');
        else el.classList.add('is-dimmed');
      });

      arrowPaths.forEach(p => {
        const involved = p.dataset.from === selectedCodigo || p.dataset.to === selectedCodigo;
        p.style.opacity = involved ? '1' : '0.08';
        p.style.strokeWidth = involved ? '2.25' : '';
      });
    }

    let sessionId = null;

    function loginInstructionsHtml(extra = '') {
      return `
        <div class="max-w-lg mx-auto bg-white border border-gray-200 rounded-2xl shadow-sm p-6 mt-10">
          <p class="text-sm font-semibold text-gray-800 mb-3">Se abrió (y trajimos al frente) una ventana del portal de la UdeA.</p>
          <ol class="text-sm text-gray-600 space-y-2 list-decimal list-inside">
            <li>En esa ventana, inicia sesión con tu usuario y contraseña institucional.</li>
            <li>Cuando ya hayas iniciado sesión, vuelve aquí y haz click abajo.</li>
          </ol>
          <button id="gotoPensumBtn" onclick="gotoPensumFlow()" class="mt-4 w-full bg-[#00783A] hover:bg-[#005f2d] text-white text-sm font-medium rounded-xl px-5 py-2.5 transition-colors">
            Ya inicié sesión → Ir a mi pénsum
          </button>
          ${extra}
        </div>`;
    }

    function analyzeInstructionsHtml(extra = '') {
      return `
        <div class="max-w-lg mx-auto bg-white border border-gray-200 rounded-2xl shadow-sm p-6 mt-10">
          <p class="text-sm font-semibold text-gray-800 mb-3">Te llevamos a la sección de pénsum en esa misma ventana.</p>
          <ol class="text-sm text-gray-600 space-y-2 list-decimal list-inside">
            <li>Si te pide la contraseña otra vez ahí, ingrésala.</li>
            <li>Cuando ya veas tu pénsum cargado, vuelve aquí y haz click en "Analizar".</li>
          </ol>
          <button id="analyzeBtn" onclick="analyzeFlow()" class="mt-4 w-full bg-[#00783A] hover:bg-[#005f2d] text-white text-sm font-medium rounded-xl px-5 py-2.5 transition-colors">
            Analizar mis notas y mi pénsum
          </button>
          ${extra}
        </div>`;
    }

    async function gotoPensumFlow() {
      const root = document.getElementById('appRoot');
      const btn = document.getElementById('gotoPensumBtn');
      if (btn) { btn.disabled = true; btn.textContent = 'Navegando…'; }

      try {
        const res = await fetch('/api/session/goto?target=pensum', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId })
        });
        const data = await res.json();

        if (data.error) {
          if (data.session_expired) {
            sessionId = null;
            root.innerHTML = `<p class="text-sm text-red-600 text-center py-6">${esc(data.error)}</p>` +
              `<div class="text-center"><button onclick="startFlow()" class="bg-[#00783A] hover:bg-[#005f2d] text-white text-sm font-medium rounded-xl px-5 py-2.5">Iniciar sesión de nuevo</button></div>`;
            return;
          }
          root.innerHTML = loginInstructionsHtml(`<p class="text-sm text-red-600 mt-3">${esc(data.error)}</p>`);
          return;
        }

        root.innerHTML = analyzeInstructionsHtml();
      } catch (e) {
        root.innerHTML = loginInstructionsHtml(`<p class="text-sm text-red-600 mt-3">No se pudo conectar con el servidor. Verifica que esté en ejecución.</p>`);
      }
    }

    async function startFlow() {
      const root = document.getElementById('appRoot');
      root.innerHTML = `
        <div class="flex flex-col items-center justify-center gap-3 py-20 text-center">
          <span class="typing-dot"></span>
          <p class="text-sm text-gray-600">Abriendo el portal de la UdeA…</p>
        </div>`;
      try {
        const res = await fetch('/api/session/start?target=pensum', { method: 'POST' });
        const data = await res.json();
        sessionId = data.session_id;

        if (data.ready) {
          root.innerHTML = `
            <div class="flex flex-col items-center justify-center gap-3 py-20 text-center">
              <span class="typing-dot"></span>
              <p class="text-sm text-gray-600">Sesión recordada, analizando tu información…</p>
            </div>`;
          await analyzeFlow();
        } else {
          root.innerHTML = loginInstructionsHtml();
        }
      } catch (e) {
        root.innerHTML = `<p class="text-sm text-red-600 text-center py-20">No se pudo conectar con el servidor. Verifica que esté en ejecución.</p>`;
      }
    }

    async function analyzeFlow() {
      const root = document.getElementById('appRoot');
      const btn = document.getElementById('analyzeBtn');
      if (btn) {
        btn.disabled = true;
        btn.textContent = 'Analizando…';
      }

      try {
        const res = await fetch('/api/map/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId })
        });
        const data = await res.json();

        if (data.error) {
          if (data.session_expired) {
            sessionId = null;
            root.innerHTML = `<p class="text-sm text-red-600 text-center py-6">${esc(data.error)}</p>` +
              `<div class="text-center"><button onclick="startFlow()" class="bg-[#00783A] hover:bg-[#005f2d] text-white text-sm font-medium rounded-xl px-5 py-2.5">Iniciar sesión de nuevo</button></div>`;
            return;
          }
          root.innerHTML = analyzeInstructionsHtml(`<p class="text-sm text-red-600 mt-3">${esc(data.error)}</p>`);
          return;
        }

        document.getElementById('headerInfo').textContent =
          `${data.estudiante} · ${data.programa} · Semestre ${data.semestre}`;

        buildMateriaIndex(data);
        selectedCodigo = null;
        root.innerHTML = buildGrid(data) + buildElectivas(data);
        requestAnimationFrame(() => drawArrows(data));
        window.addEventListener('resize', () => drawArrows(data));
        sessionId = null;

        // Si esta ventana se abrió desde el chat (window.open), le avisamos
        // para que pueda responder preguntas sobre el pénsum sin volver a
        // pedir login.
        if (window.opener && typeof window.opener.receiveMapReport === 'function') {
          window.opener.receiveMapReport(data);
        }
      } catch (e) {
        root.innerHTML = analyzeInstructionsHtml(`<p class="text-sm text-red-600 mt-3">No se pudo conectar con el servidor. Verifica que esté en ejecución.</p>`);
      }
    }

    window.addEventListener('beforeunload', () => {
      if (sessionId) {
        fetch('/api/session/cancel', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId }),
          keepalive: true
        });
      }
    });
  </script>
</body>
</html>
